name: CI

on:
  push:
    branches: [main, v1-archive]
  pull_request:
    branches: [main, v1-archive]

jobs:
  host:
    name: Host (Node 22, pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test

  agent-runner:
    name: Container agent-runner (Node 22, npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: container/agent-runner
        run: npm install --no-fund
      - working-directory: container/agent-runner
        run: npx tsc --noEmit
      - working-directory: container/agent-runner
        run: npm test

  bash-tests:
    name: Bash tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:bash
