name: CI

on:
  push:
    branches: [main, v1-archive]
  pull_request:
    branches: [main, v1-archive]

jobs:
  host:
    name: Host (Node 22, npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install host dependencies
        run: npm install --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test

  agent-runner:
    name: Container agent-runner (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install agent-runner dependencies
        working-directory: container/agent-runner
        run: npm install --no-fund
      - name: Typecheck agent-runner
        working-directory: container/agent-runner
        run: npx tsc --noEmit
      - name: Test agent-runner
        working-directory: container/agent-runner
        run: npm test

  bash-tests:
    name: Bash tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run all bash tests
        run: |
          for f in container/__tests__/*.test.sh; do
            [ -f "$f" ] && bash "$f"
          done
